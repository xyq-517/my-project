{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">交流论坛</h1>
    <p class="page-desc">分享经验，交流心得，共同关注健康</p>
</div>

<!-- 帖子列表（平铺铺满） -->
<div class="card">
    <div class="card-header">
        <div>
            <div class="card-title">最新帖子</div>
            <div class="card-subtitle">社区最新讨论内容</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openPostModal()">
            <i class="fas fa-plus"></i> 发布帖子
        </button>
    </div>
    <div class="forum-list" id="forum-list">
        <!-- 帖子列表将由 JS 动态渲染 -->
    </div>
</div>

<!-- ==================== 发布帖子弹窗 ==================== -->
<div id="postModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px; width: 92%;">
        <div class="modal-header">
            <h3>发布新帖子</h3>
            <span class="modal-close" onclick="closePostModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">帖子标题</label>
                <input type="text" id="postTitle" class="form-input" placeholder="请输入帖子标题...">
            </div>
            <div class="form-group">
                <label class="form-label">帖子内容</label>
                <textarea id="postContent" class="form-textarea" rows="6" placeholder="分享您的经验或提出问题..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">标签（用空格分隔）</label>
                <input type="text" id="postTags" class="form-input" placeholder="例如：肺结节 健康科普">
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closePostModal()">取消</button>
                <button class="btn btn-primary" onclick="submitPost()">发布</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== 帖子详情弹窗 ==================== -->
<div id="postDetailModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 700px; width: 92%;">
        <div class="modal-header">
            <h3>帖子详情</h3>
            <span class="modal-close" onclick="closePostDetailModal()">&times;</span>
        </div>
        <div class="modal-body" id="postDetailBody">
            <!-- 帖子详情动态渲染 -->
        </div>
    </div>
</div>

<script>
// ========== 用户数据隔离 ==========
const CURRENT_USER = {% if user %}'{{ user.username }}'{% else %}null{% endif %};

function userKey(key) {
    return CURRENT_USER ? ('user_' + CURRENT_USER + '_' + key) : key;
}

// ========== 数据存储 ==========
const STORAGE_KEYS = {
    posts: 'forum_posts',
    comments: 'forum_comments',
    favorites: userKey('user_favorites')
};

function getPosts() {
    try {
        const stored = localStorage.getItem(STORAGE_KEYS.posts);
        if (stored) return JSON.parse(stored);
    } catch (e) {}
    return getDefaultPosts();
}

function savePosts(posts) {
    localStorage.setItem(STORAGE_KEYS.posts, JSON.stringify(posts));
}

function getComments() {
    try {
        const stored = localStorage.getItem(STORAGE_KEYS.comments);
        if (stored) return JSON.parse(stored);
    } catch (e) {}
    return getDefaultComments();
}

function saveComments(comments) {
    localStorage.setItem(STORAGE_KEYS.comments, JSON.stringify(comments));
}

function getFavorites() {
    try {
        const stored = localStorage.getItem(STORAGE_KEYS.favorites);
        if (stored) return JSON.parse(stored);
    } catch (e) {}
    return { posts: [], articles: [] };
}

function saveFavorites(favorites) {
    localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(favorites));
}

// ========== 渲染帖子列表 ==========
let currentPostId = null;

function renderPosts() {
    const posts = getPosts();
    const favorites = getFavorites();
    const container = document.getElementById('forum-list');

    if (posts.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>暂无帖子，快来发布第一条吧！</p></div>';
        return;
    }

    let html = '';
    posts.forEach(post => {
        const isFavorited = favorites.posts.some(f => f.id === post.id);
        html += `
        <div class="forum-item" data-post-id="${post.id}">
            <div class="forum-header">
                <div class="forum-avatar">${post.avatar}</div>
                <div class="forum-author">
                    <div class="forum-author-name">${escapeHtml(post.author)}</div>
                    <div class="forum-time">${escapeHtml(post.time)}</div>
                </div>
            </div>
            <div class="forum-title" onclick="openPostDetailModal('${post.id}')" style="cursor: pointer;">${escapeHtml(post.title)}</div>
            <div class="forum-content" onclick="openPostDetailModal('${post.id}')" style="cursor: pointer;">${escapeHtml(post.content)}</div>
            <div class="forum-tags">
                ${post.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
            <div class="forum-actions">
                <div class="forum-action" onclick="toggleLike('${post.id}')">
                    <i class="fas fa-thumbs-up"></i> <span id="likes-${post.id}">${post.likes}</span>
                </div>
                <div class="forum-action" onclick="openPostDetailModal('${post.id}')">
                    <i class="fas fa-comment"></i> <span id="comments-${post.id}">${post.commentCount}</span>
                </div>
                <div class="forum-action ${isFavorited ? 'favorited' : ''}" onclick="toggleFavoritePost('${post.id}')">
                    <i class="fas fa-star"></i> <span id="fav-text-${post.id}">${isFavorited ? '已收藏' : '收藏'}</span>
                </div>
            </div>
        </div>
        `;
    });
    container.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ========== 发布帖子 ==========
function openPostModal() {
    document.getElementById('postModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closePostModal() {
    document.getElementById('postModal').style.display = 'none';
    document.body.style.overflow = '';
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';
    document.getElementById('postTags').value = '';
}

function submitPost() {
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('postContent').value.trim();
    const tagsStr = document.getElementById('postTags').value.trim();

    if (!title) {
        alert('请输入帖子标题');
        return;
    }
    if (!content) {
        alert('请输入帖子内容');
        return;
    }

    const tags = tagsStr ? tagsStr.split(/\s+/).filter(t => t) : ['经验分享'];
    const now = new Date();
    const timeStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    const newPost = {
        id: 'post_' + Date.now(),
        author: '我',
        avatar: '我',
        time: timeStr,
        title: title,
        content: content,
        tags: tags,
        likes: 0,
        commentCount: 0
    };

    const posts = getPosts();
    posts.unshift(newPost);
    savePosts(posts);

    closePostModal();
    renderPosts();
}

// ========== 点赞 ==========
function toggleLike(postId) {
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (post) {
        post.likes++;
        savePosts(posts);
        const listLikesEl = document.getElementById('likes-' + postId);
        if (listLikesEl) {
            listLikesEl.textContent = post.likes;
        }
        const detailLikesEl = document.getElementById('detail-likes-' + postId);
        if (detailLikesEl) {
            detailLikesEl.textContent = post.likes;
        }
    }
}

// ========== 帖子详情弹窗功能 ==========
function openPostDetailModal(postId) {
    currentPostId = postId;
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return;

    const favorites = getFavorites();
    const isFavorited = favorites.posts.some(f => f.id === postId);
    const comments = getComments();
    const postComments = comments[postId] || [];

    const modalBody = document.getElementById('postDetailBody');

    let html = `
        <div style="margin-bottom: 20px;">
            <div class="forum-header" style="margin-bottom: 16px;">
                <div class="forum-avatar">${post.avatar}</div>
                <div class="forum-author">
                    <div class="forum-author-name">${escapeHtml(post.author)}</div>
                    <div class="forum-time">${escapeHtml(post.time)}</div>
                </div>
            </div>
            <h2 style="font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; line-height: 1.4;">${escapeHtml(post.title)}</h2>
            <div style="font-size: 15px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 16px; white-space: pre-wrap;">${escapeHtml(post.content)}</div>
            <div class="forum-tags" style="margin-bottom: 16px;">
                ${post.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
            <div class="forum-actions" style="border-top: 1px solid var(--border); padding-top: 12px;">
                <div class="forum-action" onclick="toggleLike('${post.id}')">
                    <i class="fas fa-thumbs-up"></i> <span id="detail-likes-${post.id}">${post.likes}</span>
                </div>
                <div class="forum-action">
                    <i class="fas fa-comment"></i> <span id="detail-comment-action-${post.id}">${post.commentCount}</span>
                </div>
                <div class="forum-action ${isFavorited ? 'favorited' : ''}" onclick="toggleFavoritePost('${post.id}'); updateDetailFavState('${post.id}');">
                    <i class="fas fa-star"></i> <span id="detail-fav-text-${post.id}">${isFavorited ? '已收藏' : '收藏'}</span>
                </div>
            </div>
        </div>

        <div style="border-top: 1px solid var(--border); padding-top: 20px;">
            <h4 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;">
                <i class="fas fa-comments" style="margin-right: 8px; color: var(--primary);"></i>评论 (<span id="detail-comment-count-${post.id}">${postComments.length}</span>)
            </h4>
            <div id="detailCommentList" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;">
                ${renderDetailCommentsHtml(postComments)}
            </div>
            <div style="display: flex; gap: 12px; align-items: flex-start;">
                <input type="text" id="detailCommentInput" class="form-input" placeholder="写下您的评论..." style="flex: 1;" onkeypress="if(event.key==='Enter')submitDetailComment()">
                <button class="btn btn-primary" onclick="submitDetailComment()">发送</button>
            </div>
        </div>
    `;

    modalBody.innerHTML = html;
    document.getElementById('postDetailModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closePostDetailModal() {
    document.getElementById('postDetailModal').style.display = 'none';
    document.body.style.overflow = '';
    currentPostId = null;
}

function renderDetailCommentsHtml(postComments) {
    if (postComments.length === 0) {
        return '<div style="text-align: center; color: var(--text-muted); padding: 20px;">暂无评论，快来发表第一条评论吧！</div>';
    }

    let html = '';
    postComments.forEach(comment => {
        html += `
        <div style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start;">
            <div class="forum-avatar" style="width: 36px; height: 36px; font-size: 14px; flex-shrink: 0;">${comment.avatar}</div>
            <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <span style="font-weight: 600; font-size: 14px; color: var(--text-primary);">${escapeHtml(comment.author)}</span>
                    <span style="font-size: 12px; color: var(--text-muted);">${escapeHtml(comment.time)}</span>
                </div>
                <div style="font-size: 14px; color: var(--text-secondary); line-height: 1.5;">${escapeHtml(comment.content)}</div>
            </div>
        </div>
        `;
    });
    return html;
}

function submitDetailComment() {
    const input = document.getElementById('detailCommentInput');
    const content = input.value.trim();

    if (!content) {
        alert('请输入评论内容');
        return;
    }
    if (!currentPostId) return;

    const now = new Date();
    const timeStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

    const newComment = {
        author: '我',
        avatar: '我',
        time: timeStr,
        content: content
    };

    const comments = getComments();
    if (!comments[currentPostId]) {
        comments[currentPostId] = [];
    }
    comments[currentPostId].push(newComment);
    saveComments(comments);

    const posts = getPosts();
    const post = posts.find(p => p.id === currentPostId);
    if (post) {
        post.commentCount = comments[currentPostId].length;
        savePosts(posts);
        const listCommentsEl = document.getElementById('comments-' + currentPostId);
        if (listCommentsEl) {
            listCommentsEl.textContent = post.commentCount;
        }
        const detailCommentActionEl = document.getElementById('detail-comment-action-' + currentPostId);
        if (detailCommentActionEl) {
            detailCommentActionEl.textContent = post.commentCount;
        }
        const detailCommentCountEl = document.getElementById('detail-comment-count-' + currentPostId);
        if (detailCommentCountEl) {
            detailCommentCountEl.textContent = post.commentCount;
        }
    }

    input.value = '';

    const commentList = document.getElementById('detailCommentList');
    commentList.innerHTML = renderDetailCommentsHtml(comments[currentPostId]);
    commentList.scrollTop = commentList.scrollHeight;
}

function updateDetailFavState(postId) {
    const favorites = getFavorites();
    const isFavorited = favorites.posts.some(f => f.id === postId);
    const favTextEl = document.getElementById('detail-fav-text-' + postId);
    if (favTextEl) {
        favTextEl.textContent = isFavorited ? '已收藏' : '收藏';
    }
}

// ========== 收藏功能 ==========
function toggleFavoritePost(postId) {
    if (!CURRENT_USER) {
        alert('请先登录后再收藏帖子');
        window.location.href = "{{ url_for('login') }}?next=forum";
        return;
    }
    const posts = getPosts();
    const post = posts.find(p => p.id === postId);
    if (!post) return;

    const favorites = getFavorites();
    const index = favorites.posts.findIndex(f => f.id === postId);

    if (index >= 0) {
        favorites.posts.splice(index, 1);
        document.querySelector(`[data-post-id="${postId}"] .forum-action:nth-child(3)`).classList.remove('favorited');
        document.getElementById('fav-text-' + postId).textContent = '收藏';
    } else {
        favorites.posts.push({
            id: postId,
            title: post.title,
            author: post.author,
            type: '帖子',
            time: new Date().toISOString().split('T')[0]
        });
        document.querySelector(`[data-post-id="${postId}"] .forum-action:nth-child(3)`).classList.add('favorited');
        document.getElementById('fav-text-' + postId).textContent = '已收藏';
    }

    saveFavorites(favorites);
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function() {
    renderPosts();
});

// ESC 关闭弹窗
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closePostModal();
        closePostDetailModal();
    }
});

// 点击弹窗外部关闭
window.onclick = function(event) {
    const postModal = document.getElementById('postModal');
    const postDetailModal = document.getElementById('postDetailModal');
    if (event.target === postModal) {
        closePostModal();
    }
    if (event.target === postDetailModal) {
        closePostDetailModal();
    }
};
</script>
