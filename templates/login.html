<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 胸腹部器官病灶检测平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .auth-logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .auth-logo p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .form-group input {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .auth-btn {
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .flash-messages {
            margin-bottom: 16px;
        }
        .flash-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .flash-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .flash-message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }
        .flash-message.info {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }
        .mode-select {
            display: flex;
            gap: 12px;
            margin-top: 4px;
        }
        .mode-option {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .mode-option:hover {
            border-color: var(--primary-light);
            background: rgba(99, 102, 241, 0.02);
        }
        .mode-option input[type="radio"] {
            display: none;
        }
        .mode-option input[type="radio"]:checked + .mode-content {
            color: var(--primary);
        }
        .mode-option:has(input[type="radio"]:checked) {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }
        .mode-content i {
            font-size: 24px;
            margin-bottom: 8px;
            display: block;
        }
        .mode-content span {
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-lungs"></i></div>
                <h1>胸腹部器官病灶检测平台</h1>
                <p>基于人工智能的胸腹器官病灶检测平台</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-message {{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="auth-form" method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label>选择模式</label>
                    <div class="mode-select">
                        <label class="mode-option">
                            <input type="radio" name="mode" value="public" checked>
                            <div class="mode-content">
                                <i class="fas fa-users"></i>
                                <span>大众模式</span>
                            </div>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="mode" value="doctor">
                            <div class="mode-content">
                                <i class="fas fa-user-md"></i>
                                <span>医生模式</span>
                            </div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="auth-btn">登录</button>
            </form>

            <div class="auth-footer">
                还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
            </div>
        </div>
    </div>
</body>
</html>
